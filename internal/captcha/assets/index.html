<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verification</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI Variable Text", "Microsoft YaHei UI", "PingFang SC", sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(255, 244, 216, 0.55), transparent 42%),
                linear-gradient(180deg, rgba(250, 246, 240, 0.9), rgba(244, 238, 230, 0.82));
        }

        .shell {
            width: min(100%, 620px);
            height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        .geetest-frame {
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.56);
            box-shadow:
                0 28px 56px rgba(92, 76, 66, 0.14),
                inset 0 0 0 1px rgba(132, 108, 86, 0.1);
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .shell {
                padding: 10px;
            }

            .geetest-frame {
                border-radius: 22px;
            }
        }
    </style>
    <script>
        const captchaStorageKey = "__CAPTCHA_STORAGE_KEY__";

        function readState() {
            try {
                const raw = localStorage.getItem(captchaStorageKey);
                return raw ? JSON.parse(raw) : null;
            } catch (error) {
                return null;
            }
        }

        function writeState(state) {
            localStorage.setItem(captchaStorageKey, JSON.stringify(state));
        }

        function closeWebPage() {
            window.opener = null;
            window.open("", "_self", "");
            window.close();
            window.location.replace("about:blank");
        }

        function checkClose() {
            const data = readState();
            if (data && data.needClose) {
                closeWebPage();
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            writeState({
                needClose: false,
                needCap: true,
            });

            const iframe = document.getElementById("captcha-frame");
            if (iframe) {
                iframe.src = window.location.href.replace("/?", "/geetest?");
            }

            window.setInterval(checkClose, 500);
        });
    </script>
</head>

<body>
    <main class="shell">
        <iframe id="captcha-frame" class="geetest-frame" title="captcha verification"></iframe>
    </main>
</body>

</html>
